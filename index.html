<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Zero</title> <!--put your project title here. in my case, im calling it astronomy.-->
  <link rel="stylesheet" href="src/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
  <div class="bg-loading-screen" aria-hidden="true">
    <div class="bg-loader"></div>
    <p>Loading background...</p>
  </div>
  <div class="weather-card">
    <div class="weather-wrapper">
      <div class="weather-icon">
        <img src="https://cdn.meteocons.com/3.0.0-next.10/svg/fill/clear-day.svg" alt="Clear day" width="64" height="64" />
      </div>
      <div class="temp">--- °C</div>
    </div>
    <div class="description"></div>
  </div>
  <div id="app">
    <div class="search-stack">
      <div class="glass-card search">
        <div class="search-row">
          <div class="icon"></div>
          <input type="text" class="searchbar" placeholder="Type something here...">
          <div class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>
      </div>
      <div class="search-hints">
        <span class="hint-card">/yt YouTube</span>
        <span class="hint-card">/gh GitHub</span>
        <span class="hint-card">/chat ChatGPT</span>
        <span class="hint-card">/duck DuckDuckGo</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
